<!DOCTYPE html>
<html lang="en">
<head>
    <script>
        if (sessionStorage.getItem('isLoggedIn') !== 'true') {
            window.location.replace('/login');
        }
    </script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Products - INVENTRIX</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link href="/css/style.css" rel="stylesheet">
    <!-- QR Code Library -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
</head>
<body>

<div class="app-wrapper">
    <!-- Top Navigation Bar -->
    <header class="top-navbar">
        <div class="navbar-logo">INVENTRIX</div>
        <nav class="nav-horizontal">
            <a class="nav-link" href="/dashboard"><i class="bi bi-grid"></i> Dashboard</a>
            <a class="nav-link active" href="/products"><i class="bi bi-box"></i> Products</a>
            <a class="nav-link" href="/people"><i class="bi bi-people"></i> People</a>
            <a class="nav-link" href="/orders"><i class="bi bi-cart"></i> Orders</a>
            <a class="nav-link" href="/analytics"><i class="bi bi-bar-chart"></i> Analytics</a>
            <a class="nav-link" href="/logs"><i class="bi bi-journal-text"></i> Logs</a>
            <a class="nav-link" href="/settings"><i class="bi bi-gear"></i> Settings</a>
        </nav>
        <div class="navbar-actions">

            <a class="nav-link text-danger p-2" href="#" onclick="logout()" title="Logout">
                <i class="bi bi-box-arrow-right"></i>
            </a>
        </div>
    </header>

    <!-- Sub-Header for Page Title & Actions -->
    <div class="sub-header">
        <h1 class="page-title">PRODUCT_INVENTORY</h1>
        <div class="sub-actions">
            <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#productModal" onclick="openAddModal()">
                + ADD PRODUCT
            </button>
        </div>
    </div>

    <!-- Main Content Area -->
    <main class="main-content">
        <div class="card mb-4">
            <div class="card-body">
                <div class="row g-3">
                    <div class="col-md-8">
                        <div class="input-group">
                            <span class="input-group-text bg-dark border-secondary text-muted">
                                <i class="bi bi-search"></i>
                            </span>
                            <input type="text" id="productSearch" class="form-control" placeholder="Search by product name...">
                        </div>
                    </div>
                    <div class="col-md-4">
                        <select id="categoryFilter" class="form-select">
                            <option value="">ALL_CATEGORIES</option>
                        </select>
                    </div>
                </div>
            </div>
        </div>

        <div class="card">
            <div class="card-body">
                <div class="table-responsive">
                    <table class="table table-hover align-middle">
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>Name</th>
                                <th>Category</th>
                                <th>Supplier</th>
                                <th>Price</th>
                                <th>Stock</th>
                                <th>QR CODE</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody id="productsTableBody">
                            <!-- Populated by JS -->
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>
</div>

<!-- Product Modal -->
<div class="modal fade" id="productModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="modalTitle">ADD NEW PRODUCT</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <form id="productForm">
                <div class="modal-body">
                    <input type="hidden" id="productId">
                    <div class="mb-3">
                        <label class="form-label">Product Name</label>
                        <input type="text" class="form-control" id="productName" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Category</label>
                        <input type="text" class="form-control" id="productCategory" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Price (₹)</label>
                        <input type="number" step="0.01" class="form-control" id="productPrice" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Stock Quantity</label>
                        <input type="number" class="form-control" id="productStock" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Supplier</label>
                        <select class="form-select" id="productSupplier" required>
                            <option value="">Select Supplier...</option>
                            <!-- Populated by JS -->
                        </select>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">CANCEL</button>
                    <button type="submit" class="btn btn-primary">SAVE PRODUCT</button>
                </div>
            </form>
        </div>
    </div>
</div>

<!-- QR Code Modal -->
<div class="modal fade" id="qrModal" tabindex="-1">
    <div class="modal-dialog modal-sm">
        <div class="modal-content border-0 shadow-lg" style="background: #1A1D23;">
            <div class="modal-header border-bottom border-secondary">
                <h6 class="modal-title text-white">PRODUCT_QR_ID</h6>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body text-center bg-white p-4">
                <div id="qrcode" class="d-inline-block"></div>
                <div class="mt-3 text-dark fw-bold" id="qrProductName"></div>
            </div>
            <div class="modal-footer border-top border-secondary">
                <button type="button" class="btn btn-outline-secondary btn-sm" data-bs-dismiss="modal">CLOSE</button>
            </div>
        </div>
    </div>
</div>

<!-- Global Toast Container -->
<div id="toastContainer" class="position-fixed bottom-0 end-0 p-3" style="z-index: 9999;"></div>

<script type="module" src="/js/api.js"></script>
<script type="module" src="/js/auth.js"></script>
<script src="/js/notifications.js"></script>
<script src="/js/products.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
