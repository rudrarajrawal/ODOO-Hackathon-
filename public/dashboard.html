<!DOCTYPE html>
<html lang="en">

<head>
    <script>
        if (sessionStorage.getItem('isLoggedIn') !== 'true') {
            window.location.replace('/login');
        }
    </script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - INVENTRIX</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link href="/css/style.css" rel="stylesheet">
</head>

<body>

    <div class="app-wrapper">
        <!-- Top Navigation Bar -->
        <header class="top-navbar">
            <div class="navbar-logo">INVENTRIX</div>
            <nav class="nav-horizontal">
                <a class="nav-link active" href="/dashboard"><i class="bi bi-grid"></i> Dashboard</a>
                <a class="nav-link" href="/products"><i class="bi bi-box"></i> Products</a>
                <a class="nav-link" href="/people"><i class="bi bi-people"></i> People</a>
                <a class="nav-link" href="/orders"><i class="bi bi-cart"></i> Orders</a>
                <a class="nav-link" href="/analytics"><i class="bi bi-bar-chart"></i> Analytics</a>
                <a class="nav-link" href="/logs"><i class="bi bi-journal-text"></i> Logs</a>
                <a class="nav-link" href="/settings"><i class="bi bi-gear"></i> Settings</a>
            </nav>
            <div class="navbar-actions">
                <a class="nav-link text-danger p-2" href="#" onclick="logout()" title="Logout">
                    <i class="bi bi-box-arrow-right"></i>
                </a>
            </div>
        </header>

        <!-- Sub-Header for Page Title & Actions -->
        <div class="sub-header">
            <h1 class="page-title">DASHBOARD</h1>
            <div class="sub-actions">
                <!-- Example of searched relative based on reference & contacts placeholder if needed -->
                <span class="text-muted small"><i class="bi bi-cpu"></i> System Telemetry Active</span>
            </div>
        </div>

        <!-- Main Content Area -->
        <main class="main-content">
            <div class="row g-4">
                <div class="col-md-4">
                    <div class="card h-100 p-3">
                        <h6 class="text-muted">Total Products</h6>
                        <h2 class="text-primary-neon mt-2" id="metric-products">-</h2>
                    </div>
                </div>
                <div class="col-md-4">
                    <div class="card h-100 p-3">
                        <h6 class="text-muted">Total Suppliers</h6>
                        <h2 class="text-primary-neon mt-2" id="metric-suppliers">-</h2>
                    </div>
                </div>
                <div class="col-md-4">
                    <div class="card h-100 p-3">
                        <h6 class="text-muted">Total Orders</h6>
                        <h2 class="text-primary-neon mt-2" id="metric-orders">-</h2>
                    </div>
                </div>

            </div>

            <div class="row mt-4">
                <div class="col-md-6 mb-4">
                    <div class="card h-100">
                        <div class="card-header py-3">
                            <h6 class="mb-0 text-primary-neon">ORDERS HISTORY</h6>
                        </div>
                        <div class="card-body">
                            <canvas id="ordersChart" style="max-height: 250px;"></canvas>
                        </div>
                    </div>
                </div>
                <div class="col-md-6 mb-4">
                    <div class="card h-100">
                        <div class="card-header py-3">
                            <h6 class="mb-0 text-primary-neon">STOCK DISTRIBUTION</h6>
                        </div>
                        <div class="card-body">
                            <canvas id="inventoryChart" style="max-height: 250px;"></canvas>
                        </div>
                    </div>
                </div>
            </div>


        </main>
    </div>

    <div id="toastContainer" class="position-fixed bottom-0 end-0 p-3" style="z-index: 9999;"></div>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="/js/theme.js"></script>
    <script type="module" src="/js/api.js"></script>
    <script type="module" src="/js/auth.js"></script>
    <script src="/js/notifications.js"></script>
    <script src="/js/dashboard.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
