<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Inventory MVP</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Custom CSS -->
    <link href="/css/style.css" rel="stylesheet">
    <style>
        .login-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: radial-gradient(circle at center, var(--card-bg) 0%, var(--bg-main) 100%);
        }

        .login-card {
            width: 100%;
            max-width: 400px;
            padding: 2rem;
            backdrop-filter: blur(10px);
        }

        .login-header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .login-header h2 {
            color: var(--primary);
            font-weight: 700;
            text-shadow: 0 0 10px rgba(108, 255, 108, 0.3);
        }

        .login-header p {
            color: var(--text-muted);
        }
    </style>

</head>

<body>

    <div class="login-container">
        <div class="card login-card">
            <div id="loginView">
                <div class="login-header">
                    <h2>INVENTRIX</h2>
                    <p>Access Inventory System</p>
                </div>

                <form id="loginForm">
                    <div id="loginError" class="alert alert-danger d-none" role="alert"></div>

                    <div class="mb-3">
                        <label for="email" class="form-label">Email Address</label>
                        <input type="email" class="form-control" id="email" required placeholder="admin@inventory.com"
                            value="admin@inventory.com">
                    </div>

                    <div class="mb-4">
                        <label for="password" class="form-label">Access Code</label>
                        <input type="password" class="form-control" id="password" required placeholder="••••••••"
                            value="123456">
                    </div>

                    <button type="submit" class="btn btn-primary w-100 py-2">Login</button>
                    <div class="text-center mt-3">
                        <a href="#" id="showSignupPage" class="text-decoration-none" style="color: var(--primary);">New
                            user? Register Now</a>
                    </div>
                </form>
            </div>

            <div id="signupView" class="d-none">
                <div class="login-header">
                    <h2>REGISTER NEW USER</h2>
                    <p>Create Secure Credentials</p>
                </div>

                <form id="signupForm">
                    <div id="signupError" class="alert alert-danger d-none" role="alert"></div>

                    <div class="mb-3">
                        <label for="regEmail" class="form-label">New Email Address</label>
                        <input type="email" class="form-control" id="regEmail" required
                            placeholder="new.user@inventory.com">
                    </div>

                    <div class="mb-4">
                        <label for="regPassword" class="form-label">New Access Code</label>
                        <input type="password" class="form-control" id="regPassword" required placeholder="••••••••"
                            minlength="6">
                    </div>

                    <button type="submit" class="btn btn-outline-primary w-100 py-2">SIGN UP</button>
                    <div class="text-center mt-3">
                        <a href="#" id="showLoginPage" class="text-decoration-none"
                            style="color: var(--text-muted);">Already registered? Login instead</a>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script type="module" src="/js/api.js"></script>
    <script type="module" src="/js/auth.js"></script>
</body>

</html>
