<!DOCTYPE html>
<html lang="en">
<head>
    <script>
        if (sessionStorage.getItem('isLoggedIn') !== 'true') {
            window.location.replace('/login');
        }
    </script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>People - INVENTRIX</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link href="/css/style.css" rel="stylesheet">
</head>
<body>

<div class="app-wrapper">
    <!-- Top Navigation Bar -->
    <header class="top-navbar">
        <div class="navbar-logo">INVENTRIX</div>
        <nav class="nav-horizontal">
            <a class="nav-link" href="/dashboard"><i class="bi bi-grid"></i> Dashboard</a>
            <a class="nav-link" href="/products"><i class="bi bi-box"></i> Products</a>
            <a class="nav-link active" href="/people"><i class="bi bi-people"></i> People</a>
            <a class="nav-link" href="/orders"><i class="bi bi-cart"></i> Orders</a>
            <a class="nav-link" href="/analytics"><i class="bi bi-bar-chart"></i> Analytics</a>
            <a class="nav-link" href="/logs"><i class="bi bi-journal-text"></i> Logs</a>
            <a class="nav-link" href="/settings"><i class="bi bi-gear"></i> Settings</a>
        </nav>
        <div class="navbar-actions">
            <a class="nav-link text-danger p-2" href="#" onclick="logout()" title="Logout">
                <i class="bi bi-box-arrow-right"></i>
            </a>
        </div>
    </header>

    <!-- Sub-Header for Page Title & Actions -->
    <div class="sub-header">
        <h1 class="page-title">PEOPLE_DIRECTORY</h1>
        <div class="sub-actions">
            <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#personModal" onclick="openAddModal()">
                + ADD CONTACT
            </button>
        </div>
    </div>

    <!-- Main Content Area -->
    <main class="main-content">
        <div class="card p-4">
            <div class="table-responsive">
                <table class="table table-hover align-middle">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Name</th>
                            <th>Type</th>
                            <th>Phone</th>
                            <th>Email</th>
                            <th>Address</th>
                            <th>Rating</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="peopleTableBody">
                        <!-- Data populated by people.js -->
                    </tbody>
                </table>
            </div>
        </div>
    </main>
</div>

<!-- Person Modal -->
<div class="modal fade" id="personModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="modalTitle">ADD NEW CONTACT</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <form id="personForm">
                <div class="modal-body">
                    <input type="hidden" id="personId">
                    <div class="mb-3">
                        <label class="form-label">Full Name / Company Name</label>
                        <input type="text" class="form-control" id="personName" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Contact Type</label>
                        <select class="form-select" id="personType" required>
                            <option value="Customer">Customer</option>
                            <option value="Supplier">Supplier</option>
                        </select>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Phone Reference</label>
                        <input type="text" class="form-control" id="personPhone">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Email Address</label>
                        <input type="email" class="form-control" id="personEmail">
                    </div>
                    <div class="mb-3">
                        <label class="form-label text-muted small">ADDRESS</label>
                        <textarea class="form-control bg-dark text-white border-secondary" id="personAddress" rows="2"></textarea>
                    </div>
                    <div class="mb-3">
                        <label class="form-label text-muted small">RATING (1-5)</label>
                        <input type="number" class="form-control bg-dark text-white border-secondary" id="personRating" min="0" max="5">
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">CANCEL</button>
                    <button type="submit" class="btn btn-primary">SAVE CONTACT</button>
                </div>
            </form>
        </div>
    </div>
</div>


<script type="module" src="/js/api.js"></script>
<script type="module" src="/js/auth.js"></script>
<script src="/js/people.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
